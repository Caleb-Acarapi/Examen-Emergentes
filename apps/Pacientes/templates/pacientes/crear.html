{% extends "base.html" %}

{% block title %}Nuevo Paciente — MediControl{% endblock %}

{% block content %}
<div class="page-header">
    <h2 class="mb-0"><i class="bi bi-person-plus me-2" style="color: #00d4aa;"></i>Nuevo Paciente</h2>
</div>

<div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
        <div class="card">
            <div class="card-body p-4">
                <form action="{{ url_for('bp_pacientes.crear') }}" method="POST" id="formCrearPaciente">
                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre completo</label>
                        <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Ej: María García" required>
                    </div>
                    <div class="mb-4">
                        <label for="telefono" class="form-label">Teléfono</label>
                        <input type="text" class="form-control" id="telefono" name="telefono" placeholder="Ej: 70012345" required>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-accent">
                            <i class="bi bi-check-lg me-1"></i>Guardar
                        </button>
                        <a href="{{ url_for('bp_pacientes.listar') }}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-1"></i>Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
